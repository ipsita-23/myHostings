{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join Spreetail to split expenses with your group</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/register">
      <div class="form-group">
        <label class="form-label" for="name">Full name</label>
        <input id="name" class="form-input" type="text" name="name" required placeholder="Priya Sharma" />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input id="email" class="form-input" type="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-input" type="password" name="password" required placeholder="Min 8 characters" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Create account</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:0.9rem">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
