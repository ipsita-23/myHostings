{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your Spreetail account</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input id="email" class="form-input" type="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-input" type="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Sign in</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:0.9rem">
      No account? <a href="/register">Register</a>
    </p>
  </div>
</div>
{% endblock %}
